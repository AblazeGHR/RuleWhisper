<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RuleWhisper Wiki</title>
<style>
:root{--bg:#f7f7f4;--fg:#1f2328;--muted:#6b7280;--line:#e3e3df;
--accent:#7c2d12;--accent2:#92400e;--card:#fff;--tag:#eef2f7;--tagfg:#334155}
*{box-sizing:border-box}
body{margin:0;font:14px/1.6 -apple-system,Segoe UI,Roboto,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--fg)}
header{background:var(--accent);color:#fff;padding:14px 22px}
header h1{margin:0;font-size:18px}
header .sub{opacity:.85;font-size:12px;margin-top:2px}
nav{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid var(--line);display:flex;flex-wrap:wrap;gap:4px;padding:8px 22px}
nav a{text-decoration:none;color:var(--fg);padding:5px 12px;border-radius:6px;font-size:13px;cursor:pointer}
nav a:hover{background:var(--tag)}
nav a.active{background:var(--accent);color:#fff}
main{padding:18px 22px;max-width:1180px;margin:0 auto}
h2{font-size:16px;margin:22px 0 10px;color:var(--accent2)}
table{border-collapse:collapse;width:100%;background:var(--card);margin:8px 0 18px;font-size:13px}
th,td{border:1px solid var(--line);padding:6px 9px;text-align:left;vertical-align:top}
th{background:#f0efe9;font-weight:600;white-space:nowrap}
tr:nth-child(even) td{background:#fafaf8}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
details{border:1px solid var(--line);border-radius:8px;background:var(--card);margin:10px 0;overflow:hidden}
summary{cursor:pointer;padding:10px 14px;font-weight:600;background:#f0efe9;list-style:none}
summary::-webkit-details-marker{display:none}
summary .cnt{color:var(--muted);font-weight:400;margin-left:6px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
.card{border:1px solid var(--line);border-radius:10px;background:var(--card);padding:14px 16px}
.card h3{margin:0 0 2px;font-size:15px}
.card .aka{color:var(--muted);font-size:12px;margin-bottom:8px}
.kv{display:grid;grid-template-columns:repeat(2,1fr);gap:2px 14px;font-size:12.5px}
.kv b{color:var(--muted);font-weight:500}
.card .row{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 0;font-size:12.5px}
.tag{display:inline-block;background:var(--tag);color:var(--tagfg);border-radius:4px;padding:1px 7px;font-size:11.5px;margin:1px}
.search{position:sticky;top:46px;z-index:4;background:var(--bg);padding:8px 0 12px}
.search input{width:100%;max-width:420px;padding:7px 11px;border:1px solid var(--line);border-radius:7px;font-size:13px}
.note{color:var(--muted);font-size:12px;margin:4px 0 14px}
.scroll{overflow-x:auto}
.empty{color:var(--muted);padding:30px;text-align:center}
footer{color:var(--muted);font-size:12px;padding:14px 22px;border-top:1px solid var(--line)}
.mini{border:1px solid var(--line);margin:4px 0;font-size:12px;width:auto}
.mini th,.mini td{border:1px solid var(--line);padding:2px 6px}
.mini th{background:#f0efe9;font-weight:600}
blockquote{border-left:3px solid var(--line);margin:6px 0;padding:4px 12px;color:var(--muted)}
pre{max-width:100%;overflow-x:auto;background:#f0efe9;padding:10px 14px;border-radius:6px;border:1px solid var(--line);font-size:12.5px}
pre code{white-space:pre-wrap;word-break:break-word}
@media(max-width:768px){
  header{padding:10px 14px}
  header h1{font-size:16px}
  nav{padding:6px 8px;gap:2px}
  nav a{padding:4px 8px;font-size:12px}
  main{padding:10px 12px}
  h2{font-size:15px;margin:16px 0 8px}
  .cards{grid-template-columns:1fr}
  .card{padding:12px 14px}
  .kv{grid-template-columns:1fr 1fr}
  .kv span{font-size:12px}
  .search{top:44px}
  .search input{max-width:100%}
  table{font-size:12px}
  th,td{padding:4px 5px}
  details summary{padding:8px 10px;font-size:13px}
  footer{padding:10px 14px;font-size:11px}
  .rules-table,.rules-table tbody,.rules-table tr,.rules-table td{display:block}
  .rules-table thead{display:none}
  .rules-table tr{border:1px solid var(--line);border-radius:8px;background:var(--card);padding:10px 14px;margin:8px 0}
  .rules-table td{border:none;padding:3px 0;text-align:left}
  .rules-table td::before{content:attr(data-label);font-weight:600;color:var(--muted);display:inline-block;min-width:66px;font-size:11px;margin-right:6px}
}
</style>
</head>
<body>
<header><h1>RuleWhisper ж•°жҚ® Wiki</h1><div class="sub">з»“жһ„еҢ–ж•°жҚ®е®ЎжҹҘ В· жӣҙж–° 2026-07-12 17:46</div></header>
<nav id="nav"></nav>
<main id="content"><div class="empty">еҠ иҪҪдёӯвҖҰ</div></main>
<footer>з”ұ docs/wiki/build.py жһ„е»ә В· SPA зәҜеүҚз«ҜжёІжҹ“</footer>
<script>
var PAGE = location.hash.slice(1)||'index';
var LABELS = {weapons:'жӯҰеҷЁ',monsters:'жҖӘзү©',spells:'жі•жңҜ',skills:'жҠҖиғҪ',rules:'и§„еҲҷ'};
var PAGES = ['weapons','monsters','spells','skills','rules'];

function h(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function setActive(page){
  document.querySelectorAll('nav a').forEach(function(a){a.classList.toggle('active',a.getAttribute('data-page')===page)})
  history.replaceState(null,'','#'+page);
}

function render(){var c=document.getElementById('content');var fn=renderers[PAGE];c.innerHTML=fn?fn():(renderers.index?renderers.index():'')}

window.onhashchange=function(){
  var h=location.hash.slice(1);
  if(renderers[h]){PAGE=h;setActive(PAGE);render()}
  else{var el=document.getElementById(h);if(el)el.scrollIntoView({behavior:'smooth'})}
}

// жҗңзҙўжЎҶ
function searchBox(id){return'<div class="search"><input placeholder="жҢүе…ій”®иҜҚиҝҮж»ӨвҖҰ" oninput="var q=this.value.toLowerCase();document.querySelectorAll(\'#content [data-q]\').forEach(function(r){r.style.display=(!q||(r.getAttribute(\'data-q\')||\'\').indexOf(q)>=0)?\'\':\'none\'})"></div>'}

// еҜјиҲӘ
function buildNav(){
  var s=PAGES.map(function(p){return'<a data-page="'+p+'" href="#'+p+'">'+LABELS[p]+'</a>'}).join('');
  s+='<a data-page="readme" href="#readme">README</a>';
  s+='<a href="https://github.com/AblazeGHR/RuleWhisper" target="_blank" style="font-weight:700;background:#e8f0fe;color:#1a73e8">вӯҗ GitHub</a>';
  document.getElementById('nav').innerHTML=s;
  setActive(PAGE);
}

var DATA=null;
function loadData(){if(DATA)return;var x=new XMLHttpRequest();x.open('GET','data.json',false);x.send();DATA=JSON.parse(x.responseText)}

var renderers={
  index:function(){
    loadData();
    var cards=PAGES.map(function(p){
      var count=DATA[p]?DATA[p].length:0;
      return'<div class="card" style="grid-column:span 1"><h3><a href="#'+p+'">'+LABELS[p]+'</a></h3><div class="aka">'+count+' жқЎ</div></div>'
    }).join('');
    var rc=Object.keys(DATA.rules_modules||{}).map(function(k){
      var n=DATA.rules_modules[k].length;
      return'<div class="card" style="grid-column:span 1"><h3><a href="#rules">и§„еҲҷВ·'+k+'</a></h3><div class="aka">'+n+' жқЎ</div></div>'
    }).join('');
    return'<h2>ж•°жҚ®жӣҙж–°ж—¶й—ҙ '+DATA.updated+'</h2><div class="note">зӮ№еҮ»иҝӣе…Ҙеҗ„ж•°жҚ®е®ЎжҹҘйЎөгҖӮ</div><h2>жҖ»и§Ҳ</h2><div class="cards">'+cards+rc+'</div>'
  },

  weapons:function(){
    loadData();
    var groups={};DATA.weapons.forEach(function(r){var c=r.зұ»еҲ«||'жңӘеҲҶзұ»';(groups[c]=groups[c]||[]).push(r)});
    var cols=[['еҗҚз§°','еҗҚз§°'],['жҠҖиғҪ','жҠҖиғҪ'],['дјӨпҝҪпҝҪпҝҪ','дјӨе®і'],['еҹәзЎҖе°„зЁӢ','е°„зЁӢ'],['жҜҸиҪ®','жҜҸиҪ®'],['иЈ…еј№йҮҸ','иЈ…еј№йҮҸ'],['д»·ж ј','д»·ж ј'],['ж•…йҡңеҖј','ж•…йҡңеҖј'],['иҙҜз©ҝ','иҙҜз©ҝ'],['ж—¶д»Ј','ж—¶д»Ј']];
    var s='<h2>жӯҰеҷЁжҖ»и§Ҳ ('+DATA.weapons.length+' д»¶)</h2><div class="note">жҢүзұ»еҲ«жҠҳеҸ пјҢзӮ№еҮ»еұ•ејҖ/ж”¶иө·гҖӮ</div>';
    Object.keys(groups).sort().forEach(function(cat){
      var items=groups[cat];
      s+='<details><summary>'+h(cat)+'<span class="cnt">'+items.length+' д»¶</span></summary>';
      s+='<div class="scroll"><table class="mono"><thead><tr>'+cols.map(function(x){return'<th>'+h(x[1])+'</th>'}).join('')+'</tr></thead><tbody>';
      items.forEach(function(r){
        var q=cols.map(function(x){return h(r[x[0]]||'')}).join(' ');
        s+='<tr data-q="'+q+'">'+cols.map(function(x){return'<td>'+h(r[x[0]]||'')+'</td>'}).join('')+'</tr>';
      });
      s+='</tbody></table></div></details>';
    });
    return searchBox('w')+s;
  },

  monsters:function(){
    loadData();
    var groups={};DATA.monsters.forEach(function(r){var c=r.еҲҶзұ»||'жңӘеҲҶзұ»';(groups[c]=groups[c]||[]).push(r)});
    var s='<h2>жҖӘзү©еҚЎ ('+DATA.monsters.length+' еҸӘ)</h2><div class="note">жҢүеҲҶзұ»жҠҳеҸ пјҢйЎ¶йғЁеҸҜиҝҮж»ӨгҖӮ</div>';
    Object.keys(groups).sort().forEach(function(cat){
      var items=groups[cat];
      s+='<details><summary>'+h(cat)+'<span class="cnt">'+items.length+' еҸӘ</span></summary><div class="cards">';
      items.forEach(function(r){
        var name=h(r.еҗҚз§°||''),aka=h(r.еҲ«еҗҚ||''),attrs=r.еұһжҖ§||{},dice=r.жҺ·йӘ°||{};
        var q=(r.еҗҚз§°||'')+' '+(r.еҲ«еҗҚ||'')+' '+(r.еҲҶзұ»||'')+' '+(r.жҠҖиғҪ||'')+' '+(r.жҲҳж–—ж–№ејҸ||'')+' '+(r.жі•жңҜ||'')+' '+(r.зҗҶжҷәжҚҹеӨұ||'')+' '+(r.id||'');
        r.зү№ж®ҠиғҪеҠӣ&&Array.isArray(r.зү№ж®ҠиғҪеҠӣ)&&(q+=' '+r.зү№ж®ҠиғҪеҠӣ.join(' '));
        Object.values(attrs).forEach(function(v){q+=' '+v});
        var kv='STR CON SIZ DEX INT POW'.split(' ').map(function(k){return'<span><b>'+k+'</b> '+h(attrs[k]||'вҖ”')+(dice[k]?' <i>('+h(dice[k])+')</i>':'')+'</span>'}).join('');
        kv+='HP йӯ”жі•еҖј дјӨе®іеҠ еҖј дҪ“ж ј з§»еҠЁ жҜҸеӣһеҗҲж”»еҮ»'.split(' ').map(function(k){return'<span><b>'+k+'</b> '+h(r[k]||'вҖ”')+'</span>'}).join('');
        var card='<div class="card" data-q="'+q+'"><h3>'+name+'</h3>';
        if(aka)card+='<div class="aka">еҲ«еҗҚпјҡ'+aka+'</div>';
        card+='<div class="tag" style="margin-bottom:6px">'+h(r.еҲҶзұ»||'')+'</div>';
        card+='<div class="kv">'+kv+'</div>';
        if(r.ж јж–—!=null)card+='<div class="row"><span><b>ж јж–—</b> '+h(r.ж јж–—)+'%</span><span><b>дјӨе®і</b> '+h(r.ж јж–—_дјӨе®і||'')+'</span></div>';
        if(r.й—ӘйҒҝ!=null)card+='<div class="row"><span><b>й—ӘйҒҝ</b> '+h(r.й—ӘйҒҝ)+'%</span></div>';
        card+='<div class="row"><span><b>жҠӨз”І</b> '+h(r.жҠӨз”І||'')+'</span></div>';
        ['жҠҖиғҪ','жҲҳж–—ж–№ејҸ','жі•жңҜ','зҗҶжҷәжҚҹеӨұ'].forEach(function(f){
          var v=r[f];if(typeof v==='object'&&v&&v.length)card+='<div class="row"><span><b>'+f+'</b> '+h(v.join('пјҢ'))+'</span></div>';
          else if(v&&v!=='ж— гҖӮ')card+='<div class="row"><span><b>'+f+'</b> '+h(v)+'</span></div>';
        });
        var sc=r.зү№ж®ҠиғҪеҠӣ;if(sc&&Array.isArray(sc)&&sc.length)card+='<div class="row"><b>зү№ж®ҠиғҪеҠӣ</b></div><div class="row"><ol style="margin:2px 0;padding-left:18px">'+sc.map(function(x){return'<li>'+h(x)+'</li>'}).join('')+'</ol></div>';
        if(r.жқҘжәҗз« иҠӮ)card+='<div class="row"><span class="tag">'+h(r.жқҘжәҗз« иҠӮ)+'</span><span class="tag">'+h(r.id||'')+'</span></div>';
        card+='</div>';
        s+=card;
      });
      s+='</div></details>';
    });
    return searchBox('m')+s;
  },

  spells:function(){
    loadData();
    var s='<h2>жі•жңҜеҲ—иЎЁ ('+DATA.spells.length+' дёӘ)</h2><div class="note">еҚЎзүҮејҸеұ•зӨәпјҢйЎ¶йғЁеҸҜиҝҮж»ӨгҖӮ</div><div class="cards">';
    DATA.spells.forEach(function(r){
      var name=h(r.еҗҚз§°||''),alias=r.еҲ«еҗҚ;
      var q=(r.еҗҚз§°||'')+' '+(r.ж¶ҲиҖ—||'')+' '+(r.ж–Ҫжі•з”Ёж—¶||'')+' '+(r.ж•Ҳжһң||'')+' '+(r.id||'');
      if(alias){if(Array.isArray(alias))q+=' '+alias.join(' ');else q+=' '+alias}
      var card='<div class="card" data-q="'+q+'"><h3>'+name+'</h3>';
      if(alias){
        if(Array.isArray(alias))card+='<div class="aka">еҲ«еҗҚпјҡ'+h(alias.join('пјҢ'))+'</div>';
        else card+='<div class="aka">еҲ«еҗҚпјҡ'+h(alias)+'</div>';
      }
      card+='<div class="kv"><span><b>ж¶ҲиҖ—</b> '+h(r.ж¶ҲиҖ—||'')+'</span><span><b>ж–Ҫжі•з”Ёж—¶</b> '+h(r.ж–Ҫжі•з”Ёж—¶||'')+'</span></div>';
      if(r.ж•Ҳжһң)card+='<div class="row"><span><b>ж•Ҳжһң</b> '+h(r.ж•Ҳжһң)+'</span></div>';
      if(r.жқҘжәҗз« иҠӮ||r.йЎөз Ғ)card+='<div class="row"><span class="tag">'+h(r.жқҘжәҗз« иҠӮ||'')+'</span>'+(r.йЎөз Ғ?'<span class="tag">'+h(r.йЎөз Ғ)+'</span>':'')+'</div>';
      card+='</div>';
      s+=card;
    });
    s+='</div>';
    return searchBox('s')+s;
  },

  skills:function(){
    loadData();
    var s='<h2>жҠҖиғҪиЎЁ ('+DATA.skills.length+' дёӘ)</h2><table class="mono"><thead><tr><th>еҗҚз§°</th><th>еҹәзЎҖеҖј</th></tr></thead><tbody>';
    DATA.skills.forEach(function(r){
      var q=(r.еҗҚз§°||'')+' '+(r.еҹәзЎҖеҖј||'');
      s+='<tr data-q="'+q+'"><td>'+h(r.еҗҚз§°||'')+'</td><td>'+h(r.еҹәзЎҖеҖј||'')+'%</td></tr>';
    });
    s+='</tbody></table>';
    return searchBox('sk')+s;
  },

  rules:function(){
    loadData();
    var groups={};DATA.rules.forEach(function(r){var m=r.жЁЎеқ—||'жңӘеҲҶзұ»';(groups[m]=groups[m]||[]).push(r)});
    var s='<div class="note">зӮ№еҮ»жЁЎеқ—еҗҚеұ•ејҖиҜҰжғ…гҖӮе…ұ '+DATA.rules.length+' жқЎи§„еҲҷгҖӮ</div>';
    Object.keys(groups).sort().forEach(function(mod){
      var items=groups[mod];
      var head='<tr><th>и§ҰеҸ‘жқЎд»¶</th><th>ж Үзӯҫ</th><th>жңәеҲ¶ж•Ҳжһң</th><th>зӣёе…іжЈҖе®ҡ</th><th>еҲӨе®ҡжөҒзЁӢ</th><th>йЎө</th></tr>';
      s+='<details><summary>'+h(mod)+'<span class="cnt">'+items.length+' жқЎ</span></summary>';
      s+='<div class="scroll"><table class="mono rules-table"><thead>'+head+'</thead><tbody>';
      items.forEach(function(r){
        var tags=(r.ж Үзӯҫ||[]).map(function(t){return'<span class="tag">'+h(t)+'</span>'}).join('');
        var flow=r.еҲӨе®ҡжөҒзЁӢ;if(Array.isArray(flow))flow='<ul style="list-style:none;margin:0;padding-left:0">'+flow.map(function(x){return'<li>'+h(x)+'</li>'}).join('')+'</ul>';else flow=h(flow||'');
        var mech=h(r.жңәеҲ¶ж•Ҳжһң||'');
        if(r.зү№ж®Ҡи§„еҲҷ)mech+=' <br><i>зү№ж®Ҡпјҡ'+h(r.зү№ж®Ҡи§„еҲҷ)+'</i>';
        if(r.иҜҙжҳҺ)mech+=' <br><i>иҜҙжҳҺпјҡ'+h(r.иҜҙжҳҺ)+'</i>';
        if(r.еҺҹж–Үеј•з”Ё)mech+=' <br><blockquote>гҖҢ'+h(r.еҺҹж–Үеј•з”Ё)+'гҖҚ</blockquote>';
        var q=(r.id||'')+' '+(r.и§ҰеҸ‘жқЎд»¶||'')+' '+(r.жңәеҲ¶ж•Ҳжһң||'')+' '+(r.еҺҹж–Үеј•з”Ё||'')+' '+(r.ж Үзӯҫ||[]).join(' ')+' '+(r.зӣёе…іжЈҖе®ҡ||[]).join(' ');
        s+='<tr data-q="'+q+'"><td data-label="и§ҰеҸ‘жқЎд»¶"><span class="tag mono">'+h(r.id||'')+'</span> '+h(r.и§ҰеҸ‘жқЎд»¶||'')+'</td><td data-label="ж Үзӯҫ">'+tags+'</td><td data-label="жңәеҲ¶ж•Ҳжһң">'+mech+'</td><td data-label="зӣёе…іжЈҖе®ҡ">'+h((r.зӣёе…іжЈҖе®ҡ||[]).join('гҖҒ'))+'</td><td data-label="еҲӨе®ҡжөҒзЁӢ">'+flow+'</td><td data-label="йЎө" class="mono">'+h(r.йЎөз Ғ||'')+'</td></tr>';
      });
      s+='</tbody></table></div></details>';
    });
    return searchBox('r')+s;
  },

  readme:function(){
    return DATA.readme||'<div class="empty">README еҶ…е®№еҠ иҪҪеӨұиҙҘ</div>';
  }
};

buildNav();

buildNav();
loadData();
render();
</script>
</body>
</html>
